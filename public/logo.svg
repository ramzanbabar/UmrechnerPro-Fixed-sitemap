<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#logoGrad)"/>
  
  <!-- Letter U -->
  <path d="M30 25 L30 55 Q30 75 50 75 Q70 75 70 55 L70 25" 
        fill="none" 
        stroke="white" 
        stroke-width="10" 
        stroke-linecap="round"/>
  
  <!-- Conversion arrows inside U -->
  <path d="M40 45 L50 35 L60 45" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M40 58 L50 68 L60 58" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
